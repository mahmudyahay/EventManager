<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Manager | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #6a11cb, #2575fc);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      max-width: 400px;
      width: 100%;
      background: #fff;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
    }
    .btn-primary {
      background-color: #2575fc;
      border: none;
    }
    .btn-primary:hover {
      background-color: #1a5ed1;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h6 class="text-center mb-4">enter your email to recover password</h6>
    <small style="color: #1a5ed1;">a new passowrd will be send to you email, pls update it after login</a></small><br>
    <form method="POST" action="forgetpassword">
      {% csrf_token %}
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" class="form-control" id="email">
      </div>
      <button type="submit" class="btn btn-primary w-100">send email</button>
    </form>
    {%if success%}
    <div class="text-center mt-3">
      <small>we have sent a new password to your email, go back to<a href="login" class="link-primary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Login</a></small> <br>
    </div>
    {%endif%}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
