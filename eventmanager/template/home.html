<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninjas Task</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .navbar .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff7eb3;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .navbar ul li {
            display: inline;
        }

        .navbar ul li a {
            text-decoration: none;
            color: #fff;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .navbar ul li a:hover {
            color: #ff7eb3;
        }

        .container {
            text-align: center;
            padding: 20px;
            animation: fadeIn 2s ease-in-out;
            flex: 1;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #e0e0e0;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1rem;
            color: #fff;
            background: #ff7eb3;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #ff4f81;
        }

        .animation-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: move 10s infinite ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes move {
            0% {
                transform: translateY(0) translateX(0);
            }
            50% {
                transform: translateY(-50px) translateX(50px);
            }
            100% {
                transform: translateY(0) translateX(0);
            }
        }

        footer {
            background: rgba(0, 0, 0, 0.9);
            text-align: center;
            padding: 20px;
            color: #e0e0e0;
            font-size: 0.9rem;
            box-shadow: 0 -4px 6px rgba(0, 0, 0, 0.1);
        }

        footer a {
            color: #ff7eb3;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #ff4f81;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .navbar ul {
                gap: 10px;
            }

            .navbar ul li a {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            p {
                font-size: 0.9rem;
            }

            .btn {
                padding: 8px 15px;
                font-size: 0.8rem;
            }

            .navbar ul {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="title">Ninjas Task</div>
        <ul>
            <li><a href="signup">signup</a></li>
            <li><a href="login">Login</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
    </div>

    <div class="container">
        <h1>Welcome to Ninjas Task</h1>
        <p>Track event and task with ease and efficiency.</p>
        <a href="signup" class="btn">Get Started</a>
    </div>

    <div class="animation-wrapper">
        <div class="circle" style="width: 200px; height: 200px; top: 10%; left: 15%;"></div>
        <div class="circle" style="width: 150px; height: 150px; bottom: 20%; right: 10%;"></div>
        <div class="circle" style="width: 100px; height: 100px; top: 50%; left: 50%;"></div>
        <div class="circle" style="width: 120px; height: 120px; bottom: 10%; left: 5%;"></div>
    </div>

    <footer>
        <p>&copy; 2025 Mahmud Yahaya. All rights reserved.</p>
    </footer>
</body>
</html>
