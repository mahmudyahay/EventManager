<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Manager | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #6a11cb, #2575fc);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      max-width: 400px;
      width: 100%;
      background: #fff;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
    }
    .btn-primary {
      background-color: #2575fc;
      border: none;
    }
    .btn-primary:hover {
      background-color: #1a5ed1;
    }
  </style>
</head>
<body>


  <div class="login-card">
    <h3 class="text-center mb-4">SignUp to Event Manager</h3>

    <form method="POST" action="signup" enctype="multipart/form-data">
      {% csrf_token %}

      <p style="color: red;"> {{error}}</p>
      <div class="mb-3">
        <label for="name" class="form-label">FullName</label>
        <input type="name" name="name" class="form-control" id="name">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" class="form-control" id="email">
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Phone no:</label>
        <input type="tell" name="phone" class="form-control" id="phone">
      </div>
      <div class="mb-3">
        <input type="hidden" name="role" class="form-control" value="user">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="text" class="form-control" name="password" id="password">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Confirm Password</label>
        <input type="text" class="form-control" name="passwordone" id="passwordone">
      </div>
      <div class="mb-3">
        <label for="image" class="form-label">Image</label>
        <input type="file" class="form-control" name="image" accept="image/*" required>
      </div>
     
      <button type="submit" class="btn btn-primary w-100">Submit</button>

    </form>

    <div class="text-center mt-3">
      <small>Already have an account? <a href="login" class="link-primary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Login</a></small> <br>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
